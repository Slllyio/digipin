    <!-- Custom Styles -->
    <!-- Theme pre-paint: paper-light is the default (matching the landing), so
         apply it before first paint unless the user explicitly chose dark — no
         flash either way. Runtime API: js/theme.js. -->
    <script>
        try {
            if (localStorage.getItem('digipin_theme') !== 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
            // Language pre-paint: set <html lang> before first paint so the
            // html[lang="hi"] rules apply with no flash. The Devanagari webfont
            // is only loaded for Hindi (here pre-paint, else lazily by I18n) so
            // English users don't pay a third-party font request. API: js/i18n.js.
            var lang = localStorage.getItem('digipin_language');
            document.documentElement.setAttribute('lang', lang === 'hi' ? 'hi' : 'en');
            if (lang === 'hi') {
                var _f = document.createElement('link');
                _f.id = 'i18n-deva-font';
                _f.rel = 'stylesheet';
                _f.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap';
                document.head.appendChild(_f);
            }
        } catch (e) { /* storage blocked — fall back to bare dark CSS / en */ }
    </script>

    <script>
    // Wire the toggle-overlay toolbar buttons: flip the overlay, then reflect
    // the on/off state via the .active class (styling) and aria-pressed (so
    // screen readers announce "pressed"/"not pressed").
    [
        ['btn-growth',    () => window.GrowthOverlay],
        ['btn-ca-growth', () => window.CAGrowthOverlay],
        ['btn-scenario',  () => window.ScenarioPanel],
        ['btn-traffic',   () => window.TrafficOverlay],
        ['btn-mobility',  () => window.MobilityOverlay],
        ['btn-heat',      () => window.HeatOverlay],
        ['btn-ndvi',      () => window.NDVIOverlay],
        ['btn-bivariate', () => window.BivariateOverlay],
        ['btn-viewshed',  () => window.Viewshed],
        ['btn-kde',       () => window.KDEOverlay],
        ['btn-access',    () => window.AccessibilityOverlay],
        ['btn-choropleth', () => window.ScoreChoropleth],
        ['btn-area',      () => window.AreaAggregate],
    ].forEach(([id, getMod]) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.setAttribute('aria-pressed', 'false');
        btn.addEventListener('click', () => {
            const mod = getMod();
            if (mod && typeof mod.toggle === 'function') mod.toggle();
            const on = btn.classList.toggle('active');
            btn.setAttribute('aria-pressed', String(on));
        });
    });
    </script>

    <!-- Dropdowns placed outside #toolbar to escape overflow:auto clipping -->
    <div id="heatmap-dropdown" class="toolbar-dropdown"></div>
    <div id="dt-layers-dropdown" class="toolbar-dropdown dt-layers-menu"></div>

</body>
</html>
