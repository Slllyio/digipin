<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DigiPin Urban Intelligence — Guna Twin City. 160+ urban features for every 4x4m grid cell. Powered by OpenStreetMap and India Post DigiPin system.">
    <title>DigiPin Urban Intelligence — Guna Twin City</title>

    <!-- MapLibre GL JS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>

    <!-- deck.gl umbrella bundle — WebGL overlay for the Aino-style 3D twin
         (white building massing, procedural window facades, instanced trees,
         ambient-occlusion + soft-shadow lighting). Provides window.deck. -->
    <script src="https://unpkg.com/deck.gl@9.0.38/dist.min.js"></script>

    <!-- Three.js (ESM importmap) for the high-fidelity "Aino Studio" scene —
         real shadow maps + SSAO + post-processing. Loaded by js/aino-scene.js. -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <script type="module" src="js/aino-scene.js"></script>

    <!-- PMTiles v3 — IIFE global build for MapLibre addProtocol -->
    <script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>

    <!-- GeoRaster for COG/GeoTIFF rendering -->
    <script src="https://unpkg.com/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>

    <!-- Theme pre-paint: Aino paper-light is the default unless the user chose dark
         (no flash either way). Runtime API: ../js/theme.js. -->
    <script>
        try {
            if (localStorage.getItem('digipin_theme') !== 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
            var lang = localStorage.getItem('digipin_language');
            document.documentElement.setAttribute('lang', lang === 'hi' ? 'hi' : 'en');
            if (lang === 'hi') {
                var _f = document.createElement('link');
                _f.id = 'i18n-deva-font'; _f.rel = 'stylesheet';
                _f.href = 'https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap';
                document.head.appendChild(_f);
            }
        } catch (e) { /* storage blocked — fall back to bare CSS / en */ }
    </script>
    <meta name="theme-color" content="#f4f6f7">

    <!-- Custom Styles (shared with parent) -->
    <link rel="stylesheet" href="../css/styles.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
</head>
<body>

    <!-- ===== MAP ===== -->
    <div id="map" role="application" aria-label="Interactive DigiPin grid map of Guna"></div>

    <!-- ===== TOP BAR ===== -->
    <div id="top-bar" role="search" aria-label="Search for locations">
        <div class="logo" aria-hidden="true">
            <div class="logo-icon">DP</div>
            <span class="logo-text">DigiPin — Guna</span>
        </div>
        <select id="city-select" aria-label="Select city"></select>
        <label for="search-input" class="sr-only">Search DigiPin code or place name</label>
        <input type="text" id="search-input" placeholder="Search DigiPin code or place name (e.g. Guna Fort)" autocomplete="off" aria-label="Search DigiPin code or place name">
        <button id="search-btn" aria-label="Search">🔍</button>
        <button id="theme-toggle-btn" aria-label="Switch theme" title="Switch theme" data-i18n-title="btn.theme">☀️</button>
    </div>

    <!-- ===== TOOLBAR ===== -->
    <div id="toolbar" aria-label="Map tools">
        <button class="toolbar-btn" id="btn-heatmap" title="Heatmap Overlay">
            <span class="tb-icon">&#9632;</span>
            <span class="tb-label">Heatmap</span>
        </button>
        <button class="toolbar-btn" id="btn-wards" title="Ward Boundaries">
            <span class="tb-icon">&#9638;</span>
            <span class="tb-label">Wards</span>
        </button>
        <button class="toolbar-btn" id="btn-lcz" title="Local Climate Zones Overlay">
            <span class="tb-icon">&#127961;</span>
            <span class="tb-label">LCZ</span>
        </button>
        <button class="toolbar-btn" id="btn-buildings" title="Buildings Overlay">
            <span class="tb-icon">&#127970;</span>
            <span class="tb-label">Buildings</span>
        </button>
        <button class="toolbar-btn" id="btn-3d" title="Toggle 3D View">
            <span class="tb-icon">&#9650;</span>
            <span class="tb-label">3D</span>
        </button>
        <button class="toolbar-btn" id="btn-aino" title="Aino 3D Twin — white architectural massing model (deck.gl)">
            <span class="tb-icon">&#127961;</span>
            <span class="tb-label">Aino 3D</span>
        </button>
        <button class="toolbar-btn" id="btn-lulc" title="Land Use Land Cover">
            <span class="tb-icon">&#127758;</span>
            <span class="tb-label">LULC</span>
        </button>
        <button class="toolbar-btn" id="btn-roads" title="Road Network">
            <span class="tb-icon">&#128739;</span>
            <span class="tb-label">Roads</span>
        </button>
        <button class="toolbar-btn" id="btn-dt-layers" title="Digital Twin Layers">
            <span class="tb-icon">&#128203;</span>
            <span class="tb-label">Layers</span>
        </button>
        <button class="toolbar-btn" id="btn-compare" title="Compare Pinned Cells">
            <span class="tb-icon">&#128200;</span>
            <span class="tb-label">Compare</span>
        </button>
        <button class="toolbar-btn" id="btn-bookmarks" title="Saved Bookmarks">
            <span class="tb-icon">&#9733;</span>

        <button class="toolbar-btn" id="btn-choropleth" title="Score grid — instant choropleth from precomputed tiles (livability)">
            <span class="tb-icon">&#129518;</span><span class="tb-label" data-i18n="tb.grid">Grid</span>
        </button>
        <button class="toolbar-btn" id="btn-heat" title="Urban Heat Island">
            <span class="tb-icon">&#127777;&#65039;</span><span class="tb-label" data-i18n="tb.heat">Heat</span>
        </button>
        <button class="toolbar-btn" id="btn-growth" title="Urban Growth Forecast">
            <span class="tb-icon">&#128200;</span><span class="tb-label" data-i18n="tb.growth">Growth</span>
        </button>
        <button class="toolbar-btn" id="btn-ca-growth" title="Growth Prediction (CA-ML) — hindcast-validated urbanization probability">
            <span class="tb-icon">&#129529;</span><span class="tb-label" data-i18n="tb.predict">Predict</span>
        </button>
        <button class="toolbar-btn" id="btn-scenario" title="Growth scenario — interactive what-if lens on the CA-ML prediction">

        </button>
        <button class="toolbar-btn" id="btn-traffic" title="Traffic — structural congestion (road-network Level of Service) + transit access">

        </button>
        <button class="toolbar-btn" id="btn-mobility" title="Law &amp; Order Mobility — access chokepoints, sealable pockets &amp; police reach">
            <span class="tb-icon">&#128737;&#65039;</span><span class="tb-label" data-i18n="tb.mobility">L&amp;O</span>
        </button>
        <button class="toolbar-btn" id="btn-ndvi" title="NDVI Vegetation Health (NASA GIBS / MODIS)">

        </button>
        <button class="toolbar-btn" id="btn-bivariate" title="Bivariate Map — two scores in one 3×3 palette">

        </button>
        <button class="toolbar-btn" id="btn-kde" title="Hotspot — kernel-density surface of a score">

        </button>
        <button class="toolbar-btn" id="btn-access" title="15-minute city — walking-time coverage gaps to amenities">
            <span class="tb-icon">&#9855;</span><span class="tb-label" data-i18n="tb.access">15-min</span>
        </button>
        <button class="toolbar-btn" id="btn-area" title="Area summary — drag a rectangle to aggregate every cell inside it">
            <span class="tb-icon">&#11036;</span><span class="tb-label">Area</span>
        </button>
        <button class="toolbar-btn" id="btn-viewshed" title="Viewshed — line-of-sight from map centre (DEM)">
            <span class="tb-icon">&#128065;</span><span class="tb-label" data-i18n="tb.viewshed">Viewshed</span>
        </button>
        <button class="toolbar-btn" id="btn-measure" title="Measure — click points for distance; close 3+ points for area">
            <span class="tb-icon">&#128207;</span><span class="tb-label" data-i18n="tb.measure">Measure</span>
        </button>
        <button class="toolbar-btn" id="btn-sun" title="Sun &amp; shadow study — light the 3D buildings from the real solar position">
            <span class="tb-icon">&#9728;&#65039;</span><span class="tb-label" data-i18n="tb.sun">Sun</span>
        </button>
        <button class="toolbar-btn" id="btn-pitch" title="Pitch map — export a presentation-ready PNG of the current view">
            <span class="tb-icon">&#128247;</span><span class="tb-label" data-i18n="tb.pitch">Pitch</span>
        </button>
        <button class="toolbar-btn" id="btn-annotate" title="Annotate — drop labelled notes on the map (saved locally; export as GeoJSON)">
            <span class="tb-icon">&#128204;</span><span class="tb-label" data-i18n="tb.annotate">Annotate</span>
        </button>
        <button class="toolbar-btn" id="btn-saved-views" title="Saved Views &amp; Templates">
            <span class="tb-icon">&#128193;</span><span class="tb-label" data-i18n="tb.views">Views</span>
        </button>
        <button class="toolbar-btn" id="btn-present" title="Presentation mode — distraction-free, shareable stakeholder view">
            <span class="tb-icon">&#128421;&#65039;</span><span class="tb-label" data-i18n="tb.present">Present</span>
        </button>
    </div>

    <!-- ===== DETAIL PANEL ===== -->

            <div>
                <h2 id="panel-title-text">Select a cell</h2>
                <div id="panel-address" class="panel-address"></div>
            </div>
            <button class="close-btn" id="close-panel" aria-label="Close panel">&#10005;</button>
        </div>
        <div id="panel-content" class="panel-content"></div>
    </aside>

    <!-- ===== DISHA CHAT DIALOG (floating, draggable, resizable) =====
         Ported from the main app: js/disha-panel.js (DISHAPanel.init, called by
         js/app.js) wires #disha-input and #disha-status unconditionally, so this
         markup must exist or init throws a classList-null error. -->
    <aside id="disha-panel" class="floating-dialog" role="dialog" aria-label="DISHA AI Assistant">
        <div class="dialog-titlebar" data-dialog="disha-panel">
            <div class="disha-title">
                <span class="disha-logo" aria-hidden="true">D</span>
                <span>DISHA</span>
                <span class="disha-status" id="disha-status" title="Checking provider..." role="status">...</span>
                <button class="disha-gear-btn" id="disha-settings-btn" title="AI Provider Settings" aria-label="Provider settings">&#9881;</button>
            </div>
            <div class="disha-subtitle" data-i18n="disha.subtitle">India-native DIGIPIN intelligence &bull; free &amp; auditable</div>
            <button class="close-btn" onclick="DISHAPanel.close()" aria-label="Close DISHA panel">&#10005;</button>
        </div>
        <div class="disha-body">
            <div class="disha-messages" id="disha-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>
            <div class="disha-suggestions" id="disha-suggestions" aria-label="Suggested questions"></div>
            <div class="disha-input-row">
                <label for="disha-input" class="sr-only">Ask DISHA about this location</label>
                <input type="text" id="disha-input" placeholder="Ask about this location..." data-i18n-placeholder="disha.placeholder" disabled aria-label="Ask about this location">
                <button id="disha-send" onclick="DISHAPanel.send()" disabled aria-label="Send message">-&gt;</button>
                <button id="disha-stop" onclick="DISHA.cancel()" style="display:none" aria-label="Stop generation">||</button>
            </div>
        </div>
        <div class="dialog-resize-handle" data-dialog="disha-panel"></div>
    </aside>

    <!-- ===== QUERY ENGINE ===== -->
    <div id="query-progress" role="status" aria-live="polite">
        <div style="flex:1">
            <div id="query-progress-text">Analyzing...</div>
            <div style="height:4px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:6px;overflow:hidden;">
                <div id="query-progress-bar" style="width:0%" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
            </div>
        </div>
    </div>

    <!-- ===== COMPARE PANEL ===== -->
    <aside id="compare-panel" aria-label="Cell comparison">
        <div class="compare-panel-header">
            <h3>Cell Comparison</h3>
            <button class="close-btn" onclick="Compare.closePanel()" aria-label="Close compare">&#10005;</button>
        </div>
        <canvas id="compare-radar"></canvas>
        <div id="compare-content" class="compare-content"></div>
        <div class="compare-actions">
            <button class="compare-clear-btn" onclick="Compare.clearAll()">Clear All Pins</button>
        </div>
    </aside>

    <!-- ===== BOOKMARKS PANEL ===== -->
    <aside id="bookmarks-panel" aria-label="Saved bookmarks">
        <div class="bm-panel-header">
            <h3>&#9733; Bookmarks</h3>
            <button class="close-btn" onclick="Bookmarks.closePanel()" aria-label="Close bookmarks">&#10005;</button>
        </div>
        <div id="bookmarks-list" class="bm-list"></div>
    </aside>

    <!-- ===== TOAST CONTAINER ===== -->
    <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

    <!-- Wire the toggle-overlay toolbar buttons (ported from the main app, which
         wires these inline). Flips the overlay + reflects .active / aria-pressed. -->
    <script>
    [
        ['btn-growth',    () => window.GrowthOverlay],
        ['btn-ca-growth', () => window.CAGrowthOverlay],
        ['btn-scenario',  () => window.ScenarioPanel],
        ['btn-traffic',   () => window.TrafficOverlay],
        ['btn-mobility',  () => window.MobilityOverlay],
        ['btn-heat',      () => window.HeatOverlay],
        ['btn-ndvi',      () => window.NDVIOverlay],
        ['btn-bivariate', () => window.BivariateOverlay],
        ['btn-viewshed',  () => window.Viewshed],
        ['btn-kde',       () => window.KDEOverlay],
        ['btn-access',    () => window.AccessibilityOverlay],
        ['btn-choropleth', () => window.ScoreChoropleth],
        ['btn-area',      () => window.AreaAggregate],
        ['btn-aino',      () => window.AinoScene],
    ].forEach(([id, getMod]) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.setAttribute('aria-pressed', 'false');
        btn.addEventListener('click', () => {
            const mod = getMod();
            if (mod && typeof mod.toggle === 'function') mod.toggle();
            const on = btn.classList.toggle('active');
            btn.setAttribute('aria-pressed', String(on));
        });
    });
    </script>
