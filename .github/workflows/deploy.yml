name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Redeploy after the precompute job commits a fresh tile (its GITHUB_TOKEN
  # push doesn't trigger the push event above), so new scores reach Pages.
  workflow_run:
    workflows: ["Precompute scores (Indore)"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
