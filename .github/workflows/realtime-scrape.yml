name: Realtime urban data — scrape & commit

# Refreshes data/realtime/<source>/latest.json on a schedule so the
# frontend always sees current alerts without each visitor hitting
# the upstream source. Output is committed back to the branch so
# Cloudflare Pages / GitHub Pages picks up the new JSON on next deploy.
#
# Cadence matches the upstream publish rhythm:
#   - NDMA SACHET: continuous; every 15 min keeps banner fresh without
#     burning quota.
# Manual dispatch is enabled for ad-hoc runs from the Actions tab.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        source: [ndma_sachet]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r scrapers/requirements.txt

      - name: Run scraper — ${{ matrix.source }}
        run: python -m scrapers.cli ${{ matrix.source }}

      - name: Commit refreshed snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/realtime/${{ matrix.source }}/latest.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(realtime): refresh ${{ matrix.source }} snapshot"
            git push
          else
            echo "No changes to commit."
          fi
