name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Reject unresolved merge-conflict markers
      run: |
        if git grep -nE '^(<{7}|={7}|>{7}) ' -- ':!node_modules' ':!*.lock' ; then
          echo "::error::Unresolved Git conflict markers detected — see lines above."
          exit 1
        fi

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install
      # No webpack step — this is a static PWA with no bundler.

    - name: Vitest (frontend unit + regression)
      run: npx vitest run

  python-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install test deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install -r scrapers/requirements.txt

    - name: Pytest (scrapers + smoke)
      run: pytest -q
