name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Reject unresolved merge-conflict markers
      run: |
        if git grep -nE '^(<{7}|={7}|>{7}) ' -- ':!node_modules' ':!*.lock' ; then
          echo "::error::Unresolved Git conflict markers detected — see lines above."
          exit 1
        fi

    - name: Reject orphaned js/*.js modules
      run: python scripts/check-orphan-js.py
      # 2026-05-25 live-smoke pass found 8 js/*.js files committed but never
      # loaded by any <script> tag — entire features (NDMA alerts, IMD,
      # quakes, flood) shipped dark. This guard makes that class of bug
      # impossible to re-introduce without an explicit allowlist marker.

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install
      # No webpack step — this is a static PWA with no bundler.

    - name: Vitest (frontend unit + regression)
      run: npx vitest run

  python-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install test deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install -r scrapers/requirements.txt

    - name: Pytest (scrapers + smoke)
      run: pytest -q

  e2e-smoke:
    runs-on: ubuntu-latest
    # Proven green on CI (the dev sandbox can't reach the MapLibre / Carto CDNs,
    # so this can only run here) — now blocking like the other jobs.
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Set up Python (serve.py webServer)
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    - name: App-boot smoke (Playwright)
      run: npx playwright test
      env:
        CI: 'true'

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: ESLint
      run: npx eslint .

  lighthouse:
    runs-on: ubuntu-latest
    # Informational PWA / performance audit. Non-blocking: it pulls live CDN
    # assets (MapLibre, Carto basemap) which the dev sandbox can't reach, so it
    # can only run here and scores vary with network.
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python (static server)
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Serve the app
      run: |
        python serve.py 8000 &
        for i in $(seq 1 20); do curl -sf http://localhost:8000 >/dev/null && break; sleep 1; done

    - name: Lighthouse audit
      uses: treosh/lighthouse-ci-action@v12
      with:
        urls: http://localhost:8000
        uploadArtifacts: true
        temporaryPublicStorage: true
