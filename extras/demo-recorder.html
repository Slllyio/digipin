<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiPin Demo Recorder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    min-height: 100vh;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  h1 {
    font-size: 28px;
    background: linear-gradient(135deg, #00e5ff, #7c4dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
  .controls {
    display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap;
  }
  button {
    padding: 10px 20px;
    border: 1px solid #333;
    background: #1a1a2e;
    color: #e0e0e0;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover { background: #2a2a4e; border-color: #7c4dff; }
  button.primary {
    background: linear-gradient(135deg, #7c4dff, #448aff);
    border: none; color: #fff; font-weight: 600;
  }
  button.primary:hover { opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .scene-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .scene {
    background: #1a1a2e;
    border: 1px solid #2a2a4e;
    border-radius: 10px;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    transition: all 0.3s;
    cursor: pointer;
  }
  .scene.active { border-color: #7c4dff; background: #1e1e3a; }
  .scene.done { border-color: #00c853; }
  .scene-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #2a2a4e;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .scene.active .scene-num { background: #7c4dff; color: #fff; }
  .scene.done .scene-num { background: #00c853; color: #fff; }
  .scene-info { flex: 1; }
  .scene-title { font-weight: 600; font-size: 15px; }
  .scene-desc { font-size: 12px; color: #888; margin-top: 2px; }
  .scene-time { font-size: 12px; color: #666; font-family: monospace; }
  .scene-status { font-size: 18px; }

  .narration-box {
    background: #111128;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 20px;
    margin-top: 30px;
    display: none;
  }
  .narration-box.visible { display: block; }
  .narration-label { color: #7c4dff; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .narration-text {
    font-size: 16px; line-height: 1.6;
    color: #ccc; font-style: italic;
  }
  .actions-label { color: #00e5ff; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }
  .actions-list { font-size: 13px; color: #aaa; line-height: 1.8; padding-left: 20px; }

  .teleprompter {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.95);
    border-top: 2px solid #7c4dff;
    padding: 20px 40px;
    font-size: 22px;
    line-height: 1.5;
    color: #fff;
    text-align: center;
    display: none;
    z-index: 9999;
    max-height: 40vh;
    overflow-y: auto;
  }
  .teleprompter.visible { display: block; }
  .teleprompter .scene-label {
    font-size: 12px; color: #7c4dff; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 8px;
  }

  .progress-bar {
    width: 100%; height: 4px; background: #1a1a2e;
    border-radius: 2px; margin: 20px 0 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c4dff, #00e5ff);
    border-radius: 2px;
    transition: width 0.5s;
    width: 0%;
  }
  .progress-text { font-size: 12px; color: #666; text-align: right; }

  kbd {
    background: #2a2a4e; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; border: 1px solid #444;
  }
  .shortcuts { margin-top: 20px; font-size: 13px; color: #666; }
  .shortcuts span { margin-right: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>DigiPin Demo Recorder</h1>
  <p class="subtitle">Guided walkthrough controller — follow scenes in order, use teleprompter for narration</p>

  <div class="controls">
    <button class="primary" id="btn-start">Start Walkthrough</button>
    <button id="btn-prev" disabled>Previous</button>
    <button id="btn-next" disabled>Next Scene</button>
    <button id="btn-teleprompter">Teleprompter: OFF</button>
    <button id="btn-open-app">Open Dashboard</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="progress-text" id="progress-text">0 / 16 scenes</div>

  <div class="scene-list" id="scene-list"></div>

  <div class="narration-box" id="narration-box">
    <div class="narration-label">Narration Script</div>
    <div class="narration-text" id="narration-text"></div>
    <div class="actions-label">On-Screen Actions</div>
    <ol class="actions-list" id="actions-list"></ol>
  </div>

  <div class="shortcuts">
    <span><kbd>&rarr;</kbd> Next scene</span>
    <span><kbd>&larr;</kbd> Previous scene</span>
    <span><kbd>T</kbd> Toggle teleprompter</span>
    <span><kbd>Space</kbd> Mark scene done</span>
  </div>
</div>

<div class="teleprompter" id="teleprompter">
  <div class="scene-label" id="tele-label"></div>
  <div id="tele-text"></div>
</div>

let currentScene = -1;
let teleprompterOn = false;

function createSceneElement(scene, index) {
  const div = document.createElement('div');
  div.className = 'scene';
  div.id = 'scene-' + index;
  div.addEventListener('click', function() { goToScene(index); });

  const num = document.createElement('div');
  num.className = 'scene-num';
  num.textContent = index + 1;

  const info = document.createElement('div');
  info.className = 'scene-info';
  const title = document.createElement('div');
  title.className = 'scene-title';
  title.textContent = scene.title;
  const desc = document.createElement('div');
  desc.className = 'scene-desc';
  desc.textContent = scene.desc;
  info.appendChild(title);
  info.appendChild(desc);

  const time = document.createElement('div');
  time.className = 'scene-time';
  time.textContent = scene.time;

  const status = document.createElement('div');
  status.className = 'scene-status';

  div.appendChild(num);
  div.appendChild(info);
  div.appendChild(time);
  div.appendChild(status);
  return div;
}

function renderScenes() {
  const list = document.getElementById('scene-list');
  list.textContent = '';
  scenes.forEach(function(s, i) {
    list.appendChild(createSceneElement(s, i));
  });
}

function updateProgress() {
  const done = document.querySelectorAll('.scene.done').length;
  const pct = (done / scenes.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + scenes.length + ' scenes';
}

function goToScene(i) {
  if (i < 0 || i >= scenes.length) return;
  document.querySelectorAll('.scene').forEach(function(el) { el.classList.remove('active'); });
  currentScene = i;
  var el = document.getElementById('scene-' + i);
  el.classList.add('active');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });

  var s = scenes[i];
  var box = document.getElementById('narration-box');
  box.classList.add('visible');
  document.getElementById('narration-text').textContent = s.narration;

  var actionsList = document.getElementById('actions-list');
  actionsList.textContent = '';
  s.actions.forEach(function(a) {
    var li = document.createElement('li');
    li.textContent = a;
    actionsList.appendChild(li);
  });

  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').disabled = i === scenes.length - 1;

  if (teleprompterOn) {
    document.getElementById('tele-label').textContent = 'Scene ' + (i + 1) + ': ' + s.title;
    document.getElementById('tele-text').textContent = s.narration;
  }
}

function nextScene() {
  if (currentScene >= 0) {
    var sceneEl = document.getElementById('scene-' + currentScene);
    sceneEl.classList.add('done');
    sceneEl.querySelector('.scene-status').textContent = '\u2713';
  }
  updateProgress();
  if (currentScene < scenes.length - 1) goToScene(currentScene + 1);
}

function prevScene() {
  if (currentScene > 0) goToScene(currentScene - 1);
}

function startDemo() {
  document.getElementById('btn-start').textContent = 'Restart';
  document.querySelectorAll('.scene').forEach(function(el) {
    el.classList.remove('done', 'active');
    el.querySelector('.scene-status').textContent = '';
  });
  currentScene = -1;
  updateProgress();
  nextScene();
}

function toggleTeleprompter() {
  teleprompterOn = !teleprompterOn;
  var tele = document.getElementById('teleprompter');
  var btn = document.getElementById('btn-teleprompter');
  if (teleprompterOn) {
    tele.classList.add('visible');
    btn.textContent = 'Teleprompter: ON';
    btn.style.borderColor = '#00e5ff';
    if (currentScene >= 0) {
      var s = scenes[currentScene];
      document.getElementById('tele-label').textContent = 'Scene ' + (currentScene + 1) + ': ' + s.title;
      document.getElementById('tele-text').textContent = s.narration;
    }
  } else {
    tele.classList.remove('visible');
    btn.textContent = 'Teleprompter: OFF';
    btn.style.borderColor = '#333';
  }
}

document.getElementById('btn-start').addEventListener('click', startDemo);
document.getElementById('btn-prev').addEventListener('click', prevScene);
document.getElementById('btn-next').addEventListener('click', nextScene);
document.getElementById('btn-teleprompter').addEventListener('click', toggleTeleprompter);
document.getElementById('btn-open-app').addEventListener('click', function() {
  window.open('index.html', '_blank');
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') nextScene();
  else if (e.key === 'ArrowLeft') prevScene();
  else if (e.key === 't' || e.key === 'T') toggleTeleprompter();
  else if (e.key === ' ') { e.preventDefault(); nextScene(); }
});

renderScenes();
</script>
</body>
</html>
